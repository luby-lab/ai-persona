    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;900&family=Noto+Sans+TC:wght@200;300;400&family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        /* ═══════════════════════════════
           LUBY DNA TOKENS & RESET
        ═══════════════════════════════ */
        :root {
            --linen:      #F8F5F0;
            --linen-deep: #EDE8E0;
            --saddle:     #332F2A;
            --etoupe:     #93887B;
            --terra:      #C48A64;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-in-out-circ: cubic-bezier(0.85, 0, 0.15, 1);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        ::selection { background: var(--terra); color: var(--linen); }

        html { scroll-behavior: smooth; font-size: 16px; }

        body {
            background: var(--linen);
            color: var(--saddle);
            font-family: 'Noto Sans TC', sans-serif;
            font-weight: 300;
            min-height: 100svh;
            overflow-x: hidden;
            cursor: none;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Noise Grain Overlay ── */
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='1.2' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none; z-index: 9990; opacity: 0.8; mix-blend-mode: multiply;
        }

        /* ── Custom Cursor ── */
        #cursor-dot {
            width: 4px; height: 4px; background: var(--terra);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9999; transform: translate(-50%, -50%);
        }
        #cursor-ring {
            width: 40px; height: 40px; border: 1px solid rgba(196,138,100,0.5);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9998; transform: translate(-50%, -50%);
            transition: width 0.3s var(--ease-out-expo), height 0.3s var(--ease-out-expo), background 0.3s, border-color 0.3s;
        }
        body:hover #cursor-ring { opacity: 1; }
        .cursor-hover #cursor-ring {
            width: 60px; height: 60px; background: rgba(196,138,100,0.05); border-color: var(--terra);
        }

        /* ── Typography & Tags ── */
        .tag {
            display: inline-flex; align-items: center; gap: 16px;
            font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.5em;
            text-transform: uppercase; color: var(--etoupe);
        }
        .tag::before { content: ''; display: inline-block; width: 24px; height: 1px; background: var(--terra); }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 500;
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 5%; transition: all 0.6s var(--ease-out-expo);

        nav.scrolled {
            background: rgba(248, 245, 240, 0.95); backdrop-filter: blur(16px);
            padding: 16px 5%; border-bottom: 1px solid rgba(147, 136, 123, 0.1);

        .nav-logo {
            font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 1.25rem;
            letter-spacing: 0.15em; color: var(--saddle); text-decoration: none;
        }
        .nav-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.4em; color: var(--etoupe); text-transform: uppercase; }

        /* ── Screen Management ── */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; min-height: 100svh;
            opacity: 0; visibility: hidden; pointer-events: none;
            transition: opacity 0.8s var(--ease-out-expo), visibility 0.8s;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 100px 5% 60px;
        }
        .screen.active { opacity: 1; visibility: visible; pointer-events: auto; position: relative; }

        /* ═══════════════════════════════
           SCREEN 1: INTRO (Cinematic)
        ═══════════════════════════════ */

        .intro-bg-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);

        .intro-inner { position: relative; z-index: 2; text-align: center; }

            font-family: 'Noto Serif TC', serif; font-weight: 900;

            letter-spacing: 0.1em; color: var(--etoupe); line-height: 2;
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 1s 0.6s var(--ease-out-expo) forwards;
        }

        .cta-btn {
            display: inline-block; background: var(--saddle); color: var(--linen);
            font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.5em; text-transform: uppercase;
            padding: 24px 64px; text-decoration: none; position: relative; overflow: hidden;
            border: none; cursor: none; margin-top: 48px;
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 1s 0.8s var(--ease-out-expo) forwards;
        }
        .cta-btn::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: var(--terra); transition: left 0.6s var(--ease-out-expo); z-index: 0;
        }
        .cta-btn:hover::before { left: 0; }
        .cta-btn span { position: relative; z-index: 1; }

        /* ═══════════════════════════════
           SCREEN 2: QUIZ (Editorial Layout)
        ═══════════════════════════════ */
        #screen-quiz { justify-content: flex-start; padding-top: 140px; }
        .quiz-container { width: 100%; max-width: 680px; position: relative; z-index: 2; margin: 0 auto; }

        .progress-wrap { margin-bottom: 64px; }
        .progress-meta {
            display: flex; justify-content: space-between; margin-bottom: 16px;
            font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.4em; color: var(--etoupe); text-transform: uppercase;
        }
        .progress-track { width: 100%; height: 1px; background: rgba(147,136,123,0.2); position: relative; }
        .progress-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--terra); transition: width 0.8s var(--ease-out-expo); }

        .q-block { position: relative; margin-bottom: 48px; min-height: 120px; }
        .q-watermark {
            position: absolute; right: -20px; top: -50px;
            font-family: 'Cormorant Garamond', serif; font-size: 10rem; font-style: italic;
            color: rgba(147,136,123,0.06); line-height: 1; pointer-events: none; z-index: -1;
        }
        .q-label-tag { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.4em; color: var(--terra); text-transform: uppercase; margin-bottom: 16px; display: block; }
        .q-text { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: clamp(1.3rem, 4vw, 1.8rem); color: var(--saddle); line-height: 1.6; }

        .choices { display: flex; flex-direction: column; gap: 12px; }
        .choice-btn {
            display: block; width: 100%; text-align: left; background: var(--linen-deep);
            border: 1px solid rgba(147,136,123,0.1); padding: 32px 36px;
            cursor: none; position: relative; overflow: hidden;
            transition: all 0.5s var(--ease-out-expo);
        }
        .choice-btn::before {
            content: ''; position: absolute; top: 0; left: 0; bottom: 0; width: 0;
            background: var(--terra); transition: width 0.4s var(--ease-out-expo);
        }
        .choice-btn:hover { background: rgba(147,136,123,0.08); padding-left: 48px; border-color: rgba(147,136,123,0.3); }
        .choice-btn:hover::before { width: 4px; }
        
        .choice-key { display: block; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.3em; color: var(--terra); text-transform: uppercase; margin-bottom: 12px; }
        .choice-text { font-family: 'Noto Sans TC', sans-serif; font-size: 15px; font-weight: 300; color: var(--saddle); line-height: 1.8; }

        /* ═══════════════════════════════
           SCREEN 3: RESULT (High-End Editorial)
        ═══════════════════════════════ */
        #screen-result { justify-content: flex-start; padding-top: 100px; padding-bottom: 0; }
        .result-wrap { width: 100%; max-width: 800px; margin: 0 auto; }

        /* 1. Hero Card */
        .r-hero-card {
            background: var(--saddle); color: var(--linen);
            padding: 80px 8% 60px; position: relative; overflow: hidden; margin-bottom: 24px;
        }
        .rh-eyebrow { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.5em; color: rgba(248,245,240,0.5); text-transform: uppercase; margin-bottom: 24px; }
        .rh-name { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 12vw, 6rem); font-style: italic; color: var(--terra); line-height: 1; margin-bottom: 16px; }
        .rh-tag { font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.3em; color: rgba(248,245,240,0.8); text-transform: uppercase; margin-bottom: 40px; }
        .rh-line { width: 60px; height: 1px; background: var(--terra); margin-bottom: 40px; }
        .rh-headline { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 1.4rem; line-height: 1.6; margin-bottom: 24px; }
        .rh-body { font-size: 14px; color: rgba(248,245,240,0.65); line-height: 2.1; font-weight: 300; }

        /* 2. Typographic Proverb (巨型浮水印版 + 互動擴充) */
        .typographic-proverb {
            padding: 60px 5%; margin-bottom: 24px; text-align: center; position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 280px;
        }
        .typographic-proverb::before {
            content: '“'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -30%);
            font-family: 'Cormorant Garamond', serif; font-size: 30rem; color: rgba(147,136,123,0.06);
            line-height: 0; pointer-events: none; z-index: 0;
        }
        .proverb-slide { position: absolute; width: 90%; opacity: 0; visibility: hidden; transition: opacity 1s ease, visibility 1s; transform: translateY(10px); z-index: 1; pointer-events: none; }
        .proverb-slide.active { opacity: 1; visibility: visible; transform: translateY(0); transition: opacity 1s ease, transform 1s var(--ease-out-expo); pointer-events: auto; }
        
        .pv-en { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.4rem, 4vw, 1.8rem); font-style: italic; color: var(--terra); line-height: 1.6; margin-bottom: 16px; pointer-events: none; }
        .pv-zh { font-family: 'Noto Serif TC', serif; font-weight: 400; font-size: clamp(0.95rem, 2.5vw, 1.1rem); color: var(--saddle); line-height: 1.8; margin-bottom: 32px; pointer-events: none; }
        .pv-meta { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.25em; color: var(--etoupe); text-transform: uppercase; pointer-events: none; }
        .pv-meta span { font-family: 'Noto Sans TC', sans-serif; letter-spacing: 0.1em; opacity: 0.5; margin-left: 8px; }

        /* 3. MBTI Grid */
        .mbti-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: rgba(147,136,123,0.15); border: 1px solid rgba(147,136,123,0.15); margin-bottom: 2px; }
        .mbti-box { background: var(--linen-deep); padding: 32px 24px; }
        .mbti-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.3em; color: var(--terra); text-transform: uppercase; margin-bottom: 12px; }
        .mbti-val { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 1.1rem; color: var(--saddle); }

        /* 4. Tips (Protocol) */
        .ed-section { background: var(--linen-deep); padding: 48px 8%; margin-bottom: 2px; border: 1px solid rgba(147,136,123,0.15); }
        .ed-header { margin-bottom: 32px; font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 0.4em; color: var(--etoupe); text-transform: uppercase; display: flex; align-items: center; gap: 12px; }
        .ed-header::before { content: ''; width: 20px; height: 1px; background: var(--terra); }
        .protocol-list { border-top: 1px solid rgba(147,136,123,0.2); }
        .protocol-item { display: flex; gap: 24px; padding: 24px 0; border-bottom: 1px solid rgba(147,136,123,0.2); }
        .protocol-dot { width: 4px; height: 4px; background: var(--terra); border-radius: 50%; margin-top: 10px; flex-shrink: 0; }
        .protocol-text { font-size: 14px; color: var(--saddle); line-height: 1.9; font-weight: 300; }

        /* 5. Collab Box */
        .collab-box { background: var(--linen); padding: 40px 8%; border: 1px solid rgba(147,136,123,0.15); margin-bottom: 2px; border-top: none; position: relative; }
        .collab-box::before { content: '好同事相處法'; position: absolute; top: -8px; left: 8%; background: var(--linen); padding: 0 8px; font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.3em; color: var(--terra); text-transform: uppercase; }
        .collab-text { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--saddle); line-height: 1.9; }

        /* 6. Blind Box */
        .blind-box { background: var(--saddle); padding: 48px 8%; margin-bottom: 2px; position: relative; overflow: hidden; }
        .blind-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(to right, var(--terra), transparent); }
        .blind-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.4em; color: rgba(248,245,240,0.5); text-transform: uppercase; margin-bottom: 16px; }
        .blind-name { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--terra); line-height: 1; margin-bottom: 16px; }
        .blind-desc { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: rgba(248,245,240,0.7); line-height: 1.9; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(248,245,240,0.1); }
        .blind-tip-label { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.3em; color: var(--terra); text-transform: uppercase; margin-bottom: 12px; }
        .blind-tip { font-size: 13px; color: rgba(248,245,240,0.5); line-height: 1.9; font-weight: 300; }

        /* 7. Combo Box */
        .combo-box { background: var(--linen-deep); padding: 48px 8%; margin-bottom: 2px; border: 1px solid rgba(147,136,123,0.15); }
        .combo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; }
        .combo-card { background: var(--linen); border: 1px solid rgba(147,136,123,0.15); padding: 24px; position: relative; overflow: hidden; }
        .combo-card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: var(--terra); }
        .combo-name { font-family: 'Cormorant Garamond', serif; font-size: 1.8rem; color: var(--terra); margin-bottom: 8px; line-height: 1; }
        .combo-role { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 0.3em; color: var(--etoupe); text-transform: uppercase; margin-bottom: 12px; }
        .combo-duty { font-size: 12px; color: var(--saddle); line-height: 1.8; font-weight: 300; }
        .combo-desc { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--etoupe); line-height: 1.9; padding-top: 24px; border-top: 1px solid rgba(147,136,123,0.15); }

        /* 8. Friend Box */
        .friend-box { background: var(--saddle); padding: 48px 8%; margin-bottom: 2px; position: relative; overflow: hidden; }
        .friend-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(to right, transparent, var(--terra), transparent); }
        .friend-eyebrow { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.4em; color: rgba(248,245,240,0.4); text-transform: uppercase; margin-bottom: 16px; }
        .friend-type { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 1.4rem; color: var(--linen); line-height: 1.5; margin-bottom: 24px; }
        .friend-body { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: rgba(248,245,240,0.6); line-height: 1.9; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid rgba(248,245,240,0.1); }
        .friend-hint { font-family: 'Cinzel', serif; font-size: 8px; letter-spacing: 0.3em; color: rgba(196,138,100,0.6); text-transform: uppercase; }

        /* 9. Restart */
        .restart-wrap { text-align: center; padding: 60px 0 60px; }
        .btn-outline {
            display: inline-block; background: transparent; border: 1px solid rgba(147,136,123,0.4); color: var(--saddle);
            font-family: 'Cinzel', serif; font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase;
            padding: 24px 64px; cursor: none; transition: all 0.5s var(--ease-out-expo); text-decoration: none;
            position: relative; overflow: hidden;
        }
        .btn-outline::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: rgba(147,136,123,0.08); transition: left 0.5s var(--ease-out-expo); z-index: 0;
        }
        .btn-outline:hover { border-color: var(--terra); color: var(--terra); }
        .btn-outline:hover::before { left: 0; }
        .btn-outline span { position: relative; z-index: 1; }

        /* Footer Simple */
        footer { padding: 40px 5% 60px; text-align: center; }
        .f-logo { font-family: 'Noto Serif TC', serif; font-weight: 900; font-size: 1.25rem; letter-spacing: 0.2em; color: var(--saddle); margin-bottom: 12px; opacity: 0.8; }
        .f-sub { font-family: 'Cinzel', serif; font-size: 7px; letter-spacing: 0.3em; color: var(--etoupe); text-transform: uppercase; }

        /* Reveal Utils */
        @keyframes revealUp { from { clip-path: polygon(0 100%, 100% 100%, 100% 100%, 0 100%); transform: translateY(40px); } to { clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%); transform: translateY(0); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { opacity: 0; transform: translateY(20px); transition: opacity 0.8s var(--ease-out-expo), transform 0.8s var(--ease-out-expo); }
        .fade-in.on { opacity: 1; transform: translateY(0); }
        .delay-1 { transition-delay: 0.15s; } .delay-2 { transition-delay: 0.3s; }
    </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- ── NAV ── -->
<nav id="nav">
    <a class="nav-logo interactable" href="#">LUBY</a>
    <div class="nav-label">AI Persona Test</div>
</nav>

<!-- ════════════ SCREEN 1: INTRO ════════════ -->
<div class="screen active" id="screen-intro">
    <div class="intro-bg-text" id="bg-text">LUBY AI</div>
    <div class="intro-inner">
        <h1 class="intro-title">五個 AI<br><em>五種人格</em></h1>
        <p class="intro-desc">你和哪個 AI 最對頻？<br>八道兩難，沒有標準答案。</p>
        <button class="cta-btn interactable" onclick="startQuiz()"><span>開始測驗</span></button>
    </div>
</div>

<!-- ════════════ SCREEN 2: QUIZ ════════════ -->
<div class="screen" id="screen-quiz">
    <div class="quiz-container">
        <div class="progress-wrap">
            <div class="progress-meta">
                <span id="q-counter">題目 1 / 8</span>
                <span id="q-category">—</span>
            </div>
            <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>

        <div class="q-block" id="q-block">
            <div class="q-watermark" id="q-num">01</div>
            <div class="q-label-tag" id="q-label-tag">工作情境</div>
            <div class="q-text" id="q-text"></div>
        </div>

        <div class="choices" id="choices"></div>
    </div>
</div>

<!-- ════════════ SCREEN 3: RESULT ════════════ -->
<div class="screen" id="screen-result">
    <div class="result-wrap">
        
        <!-- 1. 截圖卡 -->
        <div class="r-hero-card fade-in">
            <div class="rh-eyebrow">你的 AI 人格是</div>
            <div class="rh-name" id="r-name">—</div>
            <div class="rh-tag" id="r-tag">—</div>
            <div class="rh-line"></div>
            <div class="rh-headline" id="r-headline">—</div>
            <div class="rh-body" id="r-body">—</div>
        </div>

        <!-- 2. Typographic Proverb (巨型浮水印版 + 互動暫停) -->

══════════════════════════════════════════ */
let currentQ = 0;
let scores = {gpt:0, gemini:0, claude:0, grok:0, copilot:0};
let carouselTimer = null;

// ── 1. Smooth Cursor Math (Lerp) ──
const lerp = (start, end, factor) => start + (end - start) * factor;
const dot = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');
const bgText = document.getElementById('bg-text');

let mouse = { x: window.innerWidth/2, y: window.innerHeight/2 };
let cursor = { dotX: window.innerWidth/2, dotY: window.innerHeight/2, ringX: window.innerWidth/2, ringY: window.innerHeight/2 };
let bgPos = { x: 0, y: 0 };

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

document.body.addEventListener('mouseover', e => {
    if (e.target.closest('a, button, .interactable, .choice-btn')) {
        document.body.classList.add('cursor-hover');
    }
});
document.body.addEventListener('mouseout', e => {
    if (e.target.closest('a, button, .interactable, .choice-btn')) {
        document.body.classList.remove('cursor-hover');
    }
});

function renderLoop() {
    cursor.dotX = lerp(cursor.dotX, mouse.x, 0.2);
    cursor.dotY = lerp(cursor.dotY, mouse.y, 0.2);
    cursor.ringX = lerp(cursor.ringX, mouse.x, 0.1);
    cursor.ringY = lerp(cursor.ringY, mouse.y, 0.1);
    
    dot.style.transform = `translate3d(calc(${cursor.dotX}px - 50%), calc(${cursor.dotY}px - 50%), 0)`;
    ring.style.transform = `translate3d(calc(${cursor.ringX}px - 50%), calc(${cursor.ringY}px - 50%), 0)`;

    if(bgText && document.getElementById('screen-intro').classList.contains('active')) {
        const targetBgX = (mouse.x / window.innerWidth - 0.5) * 60;
        const targetBgY = (mouse.y / window.innerHeight - 0.5) * 40;
        bgPos.x = lerp(bgPos.x, targetBgX, 0.05);
        bgPos.y = lerp(bgPos.y, targetBgY, 0.05);
        bgText.style.transform = `translate(calc(-50% + ${bgPos.x}px), calc(-50% + ${bgPos.y}px))`;
    }
    requestAnimationFrame(renderLoop);
}
requestAnimationFrame(renderLoop);

// ── 2. Screen Management & GA4 Tracking ──
function switchScreen(fromId, toId, callback) {
    const fromEl = document.getElementById(fromId);
    const toEl = document.getElementById(toId);
    
    fromEl.style.opacity = '0';
    setTimeout(() => {
        fromEl.classList.remove('active');
        toEl.classList.add('active');
        window.scrollTo({ top: 0, behavior: 'auto' });
        
        if(callback) callback();
        
        setTimeout(() => { toEl.style.opacity = '1'; }, 50);
    }, 800);
}

function startQuiz() {
    if(typeof gtag === 'function') {
        gtag('event', 'quiz_start', { 'event_category': 'engagement' });
    }

    scores = {gpt:0, gemini:0, claude:0, grok:0, copilot:0};
    currentQ = 0;
    switchScreen('screen-intro', 'screen-quiz', renderQ);
}

function renderQ() {
    const q = questions[currentQ];
    const total = questions.length;
    
    document.getElementById('progress-fill').style.width = ((currentQ / total) * 100) + '%';
    document.getElementById('q-counter').textContent = `題目 ${currentQ + 1} / ${total}`;
    
    const qBlock = document.getElementById('q-block');
    const choicesEl = document.getElementById('choices');
    
    qBlock.style.opacity = '0';
    qBlock.style.transform = 'translateY(10px)';
    choicesEl.style.opacity = '0';
    
    setTimeout(() => {
        document.getElementById('q-num').textContent = String(currentQ + 1).padStart(2, '0');
        document.getElementById('q-label-tag').textContent = q.label;
        document.getElementById('q-text').textContent = q.text;
        
        choicesEl.innerHTML = '';
        ['a', 'b'].forEach((k) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn interactable';
            btn.innerHTML = `<span class="choice-key">${k.toUpperCase()}</span><span class="choice-text">${q[k].text}</span>`;
            btn.onclick = () => answer(k);
            choicesEl.appendChild(btn);
        });

        qBlock.style.transition = 'all 0.6s var(--ease-out-expo)';
        qBlock.style.opacity = '1';
        qBlock.style.transform = 'translateY(0)';
        
        choicesEl.style.transition = 'opacity 0.6s var(--ease-out-expo)';
        choicesEl.style.opacity = '1';
    }, 400);
}

function answer(key) {
    if(typeof gtag === 'function') {
        gtag('event', 'question_answered', { 
            'question_index': currentQ + 1, 
            'selected_answer': key 
        });
    }

    const q = questions[currentQ];
    for(const ai in q[key].scores) scores[ai] += q[key].scores[ai];
    
    currentQ++;
    if(currentQ >= questions.length) {
        document.getElementById('progress-fill').style.width = '100%';
        setTimeout(() => switchScreen('screen-quiz', 'screen-result', showResult), 600);
    } else {
        renderQ();
    }
}

function showResult() {
    const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
    const r = results[winner];

    if(typeof gtag === 'function') {
        gtag('event', 'quiz_complete', { 
            'result_persona': r.name 
        });
    }

    document.getElementById('r-name').textContent = r.name;
    document.getElementById('r-tag').textContent = r.tag;
    document.getElementById('r-headline').textContent = r.headline;
    document.getElementById('r-body').textContent = r.body;

    document.getElementById('r-mbti').innerHTML = r.mbti.map(m => `
        <div class="mbti-box">
            <div class="mbti-label">${m.label}</div>
            <div class="mbti-val">${m.val}</div>
        </div>`).join('');

    document.getElementById('r-tips').innerHTML = r.tips.map(t => `
        <div class="protocol-item">
            <div class="protocol-dot"></div>
            <div class="protocol-text">${t}</div>
        </div>`).join('');

    document.getElementById('r-collab').textContent = r.collab;
    
    document.getElementById('blind-ai-name').textContent = r.blind.name;
    document.getElementById('blind-desc').textContent = r.blind.desc;
    document.getElementById('blind-tip').textContent = r.blind.tip;
    
    document.getElementById('r-combo').innerHTML = r.combo.cards.map(c => `
        <div class="combo-card">
            <div class="combo-name">${c.name}</div>
            <div class="combo-role">${c.role}</div>
            <div class="combo-duty">${c.duty}</div>
        </div>`).join('');
    document.getElementById('r-combo-desc').textContent = r.combo.desc;
    
    document.getElementById('friend-type').textContent = r.friend.type;
    document.getElementById('friend-body').textContent = r.friend.body;

    initProverbs();

    setTimeout(() => {
        const reveals = document.querySelectorAll('#screen-result .fade-in');
        reveals.forEach(el => el.classList.add('on'));
    }, 100);
}

function restartQuiz() {
    if(typeof gtag === 'function') {
        gtag('event', 'quiz_restart');
    }

    if(carouselTimer) clearInterval(carouselTimer);
    const reveals = document.querySelectorAll('#screen-result .fade-in');
    reveals.forEach(el => el.classList.remove('on'));
    
    switchScreen('screen-result', 'screen-intro');
}

// ── 3. Proverb Carousel (Typographic Watermark & Interactive Pause) ──
function initProverbs() {
    if(carouselTimer) clearInterval(carouselTimer);
    const container = document.getElementById('proverb-container');
    container.innerHTML = ''; 
    
    const shuffled = proverbs.sort(() => 0.5 - Math.random());
    
    shuffled.forEach((pv, i) => {
        const slide = document.createElement('div');
        slide.className = `proverb-slide ${i === 0 ? 'active' : ''}`;
        slide.innerHTML = `
            <div class="pv-en">“${pv.en}”</div>
            <div class="pv-zh">${pv.zh}</div>
            <div class="pv-meta">${pv.authorEn} <span>|</span> ${pv.authorZh}<br><br>${pv.titleEn} <span>|</span> ${pv.titleZh}</div>
        `;
        container.appendChild(slide);
    });
    
    let pvIdx = 0;
    let isPaused = false; // 暫停狀態標記

    const nextSlide = () => {
        if (isPaused) return; // 若處於暫停狀態，跳過此次輪播切換
        const slides = document.querySelectorAll('.proverb-slide');
        if(slides.length === 0) return;
        slides[pvIdx].classList.remove('active');
        pvIdx = (pvIdx + 1) % slides.length;
        slides[pvIdx].classList.add('active');
    };

    // 輪播速度加快至 4 秒 (4000ms)
    carouselTimer = setInterval(nextSlide, 4000);

    // 加入互動：按壓/觸控時暫停
    const pauseCarousel = () => { isPaused = true; };
    const resumeCarousel = () => { isPaused = false; };

    container.addEventListener('mousedown', pauseCarousel);
    container.addEventListener('touchstart', pauseCarousel, {passive: true});
    
    container.addEventListener('mouseup', resumeCarousel);
    container.addEventListener('mouseleave', resumeCarousel);
    container.addEventListener('touchend', resumeCarousel);
    container.addEventListener('touchcancel', resumeCarousel);
}

// ── Nav Scroll Listener ──
window.addEventListener('scroll', () => {
    document.getElementById('nav').classList.toggle('scrolled', window.scrollY > 50);
});
